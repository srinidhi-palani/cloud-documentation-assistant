          - Id: 'ExpireDeleteMarkers'
            Status: Enabled
            ExpiredObjectDeleteMarker: true
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders:
              - "*"
            AllowedMethods:
              - GET
              - POST
            AllowedOrigins:
              - "*"
            ExposedHeaders: []
            MaxAge: 3000

