Resources:
  CDNCachePolicy:
    Type: AWS::CloudFront::CachePolicy
    Properties:
      CachePolicyConfig:
        Name: !Ref cdnpolicy
        Comment: "Custom cache policy for improved performance"
        DefaultTTL: 43200
        MaxTTL: 86400
        MinTTL: 43200
        ParametersInCacheKeyAndForwardedToOrigin:
          CookiesConfig:
            CookieBehavior: none
          HeadersConfig:
            HeaderBehavior: none
          QueryStringsConfig:
            QueryStringBehavior: none
          EnableAcceptEncodingBrotli: true
          EnableAcceptEncodingGzip: true

  SSIWebsiteBucket:
    Type: 'AWS::S3::Bucket'
    DeletionPolicy: Delete
    Properties:
      BucketName: !Ref SSIReactBucket
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false
      OwnershipControls:
        Rules:
        - ObjectOwnership: ObjectWriter
      WebsiteConfiguration:
        IndexDocument: 'index.html'
      LifecycleConfiguration:
        Rules:
          - Id: 'RetainObjectVersions'
            Status: Enabled
            Prefix: ""                # Apply to all objects (customize if needed)
            ObjectSizeGreaterThan: 1  # Minimum object size: 1 byte
            NoncurrentVersionExpiration:
              NoncurrentDays: 15
              NewerNoncurrentVersions: 3
          - Id: 'ExpireDeleteMarkers'
            Status: Enabled
            ExpiredObjectDeleteMarker: true

  SSIReactBucketPolicy:
    Type: AWS::S3::BucketPolicy
    DependsOn: SSIWebsiteBucket
    Properties:
      Bucket: !Ref SSIReactBucket
      PolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Deny
            Action:
              - 's3:*'
            Resource:
              - !Sub 'arn:aws:s3:::${SSIWebsiteBucket}'
              - !Sub 'arn:aws:s3:::${SSIWebsiteBucket}/*'
            Principal: '*'
            Condition: 
              Bool:
                'aws:SecureTransport': false

