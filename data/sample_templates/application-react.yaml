  CodeBuildRole:
    Type: AWS::IAM::Role
    DependsOn: CodeBuildpolicy
    Properties:
      RoleName: !Sub ${CodeBuildrolename}-role-${AWS::Region}
      Path: "/service-role/"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: codebuild.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - !Ref CodeBuildpolicy

  CodeBuildpolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: !Sub ${CodeBuildrolename}-policy-${AWS::Region}
      Path: /service-role/
      PolicyDocument:
        Version: "2012-10-17"
        Statement: 
          - Effect: Allow
            Action:
              - codestar-connections:GetConnectionToken 
              - codestar-connections:GetConnection
              - codeconnections:UseConnection
              - codeconnections:GetConnection
              - codeconnections:GetConnectionToken
            Resource:
              - !Sub ${codestarconnectionarn}
          - Effect: Allow
            Action: 
              - "s3:GetObject"
              - "s3:GetObjectVersion"
              - "s3:GetBucketAcl"
              - "s3:GetObjectAcl"
              - "s3:GetObjectVersionAcl"
              - "s3:ListBucket"
              - "s3:PutObject"
              - "s3:DeleteObject"
              - "s3:PutObjectAcl"
              - "s3:GetBucketLocation"
              - "s3:GetBucketVersioning"  
            Resource:
              - !Sub arn:aws:s3:::${SSIWebsiteBucket}
              - !Sub arn:aws:s3:::${SSIWebsiteBucket}/*
              - !Sub arn:aws:s3:::${CrsEngWebsiteBucket}
              - !Sub arn:aws:s3:::${CrsEngWebsiteBucket}/*
              - !Sub arn:aws:s3:::${CapsuleEngWebsiteBucket}
              - !Sub arn:aws:s3:::${CapsuleEngWebsiteBucket}/*
              - !Sub arn:aws:s3:::${CrsEngV2WebsiteBucket}
              - !Sub arn:aws:s3:::${CrsEngV2WebsiteBucket}/*
              - !Sub arn:aws:s3:::${SSNOWWebsiteBucket}
              - !Sub arn:aws:s3:::${SSNOWWebsiteBucket}/*
              - !Sub arn:aws:s3:::${feedWebsiteBucket}
              - !Sub arn:aws:s3:::${feedWebsiteBucket}/*
              - !Sub arn:aws:s3:::${impressWebsiteBucket}
              - !Sub arn:aws:s3:::${impressWebsiteBucket}/*
              - !Sub arn:aws:s3:::${reportWebsiteBucket}
              - !Sub arn:aws:s3:::${reportWebsiteBucket}/*
              - !Sub arn:aws:s3:::${channelfeedWebsiteBucket}
              - !Sub arn:aws:s3:::${channelfeedWebsiteBucket}/*
              - !Sub arn:aws:s3:::${authReactBucket}
              - !Sub arn:aws:s3:::${authReactBucket}/*
              - !Sub arn:aws:s3:::${PubchReactBucket}
              - !Sub arn:aws:s3:::${PubchReactBucket}/*
          - Effect: Allow
            Action:
              - "s3:GetObject"
              - "s3:GetObjectVersion"
              - "s3:GetBucketAcl"
            Resource:
            - !Sub arn:aws:s3:::${s3mobileappbucket}
            - !Sub arn:aws:s3:::${s3mobileappbucket}/*
          - Effect: Allow
            Action:
            - ecr:ListImages
            Resource: "*"
          - Effect: Allow
            Action:
            - ecr:GetAuthorizationToken
            Resource: "*"
          - Effect: Allow
            Action:
            - ecr:BatchCheckLayerAvailability
            - ecr:GetDownloadUrlForLayer
            - ecr:GetRepositoryPolicy
            - ecr:DescribeRepositories
            - ecr:ListImages
            - ecr:DescribeImages
            - ecr:BatchGetImage
            - ecr:PutImage
            - cloudfront:CreateInvalidation
            Resource: "*"
          - Effect: Allow
            Action:
              - "logs:CreateLogGroup"
              - "logs:CreateLogStream"
              - "logs:PutLogEvents" 
            Resource: 
              - !Sub arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/codebuild/*
  
  SSICloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    DependsOn: 
      - SSIWebsiteBucket
      - SSIReactBucketPolicy
      - CDNCachePolicy
    Properties:
      DistributionConfig:  
        Aliases:
          - !Ref SSIWebsiteName
        Origins:
          - DomainName: !GetAtt SSIWebsiteBucket.RegionalDomainName
            Id: !Ref SSIWebsiteBucket
            S3OriginConfig:
              OriginAccessIdentity: ''
        ViewerCertificate:
          SslSupportMethod: sni-only
          AcmCertificateArn:  !Ref CDNCertificateArn # !Ref CertificateManagerCertificate
          MinimumProtocolVersion: TLSv1.2_2021
        CustomErrorResponses:
          - ErrorCachingMinTTL: 60
            ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html 
        DefaultRootObject: index.html
        Enabled: true
        DefaultCacheBehavior:
          LambdaFunctionAssociations:
           - EventType: origin-response
             LambdaFunctionARN: !Ref securityheaderlambdaarn
          AllowedMethods: [GET, HEAD, OPTIONS, PUT, POST, PATCH, DELETE]
          CachedMethods: [GET, HEAD]
          Compress: 'true'
          CachePolicyId: !Ref CDNCachePolicy
          ForwardedValues: 
            QueryString: false
          TargetOriginId: !Ref SSIWebsiteBucket
          ViewerProtocolPolicy: "redirect-to-https"
        HttpVersion: http2
        IPV6Enabled: true

