                - aws cloudfront create-invalidation --distribution-id $DISTRIBUTION_ID --paths '/*'             
          artifacts:
            files:
              - '**/*'
            base-directory: build
            discard-paths: yes

  PubchLogGroup:
    Type: 'AWS::Logs::LogGroup'
    Properties:
      LogGroupName: !Sub '/aws/codebuild/${PubchReactAppName}'
      RetentionInDays: 60

  PubchCodeBuild:
    Type: 'AWS::CodeBuild::Project'
    Properties:
      Name: !Ref PubchReactAppName
      ServiceRole: !GetAtt CodeBuildRole.Arn
      Artifacts:
        Type: no_artifacts
      LogsConfig:
        CloudWatchLogs:
          Status: ENABLED
          GroupName: !Ref PubchLogGroup
      Environment:
        ComputeType: BUILD_GENERAL1_MEDIUM
        Type: LINUX_CONTAINER
        ImagePullCredentialsType: SERVICE_ROLE
        PrivilegedMode: true
        Image: !Ref CodebuildDockerImage
        EnvironmentVariables:
          - Name: REACT_APP_TRANSLATION_PATH 
            Value: !Ref Pubchtranslationpath
          - Name: REACT_APP_ENV
            Value: development
          - Name: REACT_APP_IMAGE_PATH
            Value: !Sub ${appassetbkturl}images
          - Name: REACT_APP_APIGATEWAY_PORT
            Value: !Ref APIGATEWAY
          - Name: REACT_APP_MAIN_TITLE
            Value: !FindInMap [CompanyName, !Ref companyname, publicchannel]
          - Name: REACT_APP_WEBSOCKET_URL
            Value: !ImportValue websocket
      Triggers:
        Webhook: false
      TimeoutInMinutes: 10
      Source:       
        Auth:
          Type: OAUTH
        Location: !Ref PubchGithubRepo
        Type: GITHUB     
        BuildSpec: !Sub |
          version: 0.2
          env:
            variables:
              S3_BUCKET: ${PubchWebsiteBucket}
              BUILD_ENV: "prod"
              DISTRIBUTION_ID: ${PubchCloudFrontDistribution}           
          phases:
            pre_build:
              commands:
                - echo Installing source NPM dependencies...
                - npm install
                #- npm audit --prod
            build:
              commands:
                - echo Build started on `date`
                - npm run build
            post_build:
              commands:
                - aws s3 rm s3://${PubchWebsiteBucket} --recursive 
                - aws s3 cp build s3://${PubchWebsiteBucket}/ --acl public-read --recursive 
                - echo Build completed on `date`
                - aws cloudfront create-invalidation --distribution-id $DISTRIBUTION_ID --paths '/*'             
          artifacts:
            files:
              - '**/*'
            base-directory: build
            discard-paths: yes

  ReactDNS:
    Type: AWS::Route53::RecordSetGroup
    Properties:
      HostedZoneName: !Ref HostedZoneName
      Comment: Zone apex alias targeted to myELB LoadBalancer.
      RecordSets:
      - Name: !Ref SSIWebsiteName
        Type: A
        AliasTarget:
          HostedZoneId: !Ref CDNHostedZoneId
          DNSName: !GetAtt SSICloudFrontDistribution.DomainName
          EvaluateTargetHealth: false
      - Name: !Ref CapsuleEngWebsiteName 
        Type: A
        AliasTarget:
          HostedZoneId: !Ref CDNHostedZoneId
          DNSName: !GetAtt CapsuleEngCloudFrontDistribution.DomainName
          EvaluateTargetHealth: false
      - Name:  !Ref CrsEngWebsiteName
        Type: A
        AliasTarget:
          HostedZoneId: !Ref CDNHostedZoneId
          DNSName: !GetAtt CrsEngCloudFrontDistribution.DomainName  
          EvaluateTargetHealth: false
      - Name:  !Ref CrsEngV2WebsiteName
        Type: A
        AliasTarget:
          HostedZoneId: !Ref CDNHostedZoneId
          DNSName: !GetAtt CrsEngV2CloudFrontDistribution.DomainName
          EvaluateTargetHealth: false
      - Name: !Ref SSNOWWebsiteName
        Type: A
        AliasTarget:
          HostedZoneId: !Ref CDNHostedZoneId
          DNSName: !GetAtt SSNOWCloudFrontDistribution.DomainName
          EvaluateTargetHealth: false
      - Name: !Ref feedWebsiteName
        Type: A
        AliasTarget:
          HostedZoneId: !Ref CDNHostedZoneId
          DNSName: !GetAtt feedCloudFrontDistribution.DomainName
          EvaluateTargetHealth: false
      - Name: !Ref impressWebsiteName
        Type: A
        AliasTarget:
          HostedZoneId: !Ref CDNHostedZoneId
          DNSName: !GetAtt impressCloudFrontDistribution.DomainName
          EvaluateTargetHealth: false
      - Name: !Ref reportWebsiteName
        Type: A
        AliasTarget:
          HostedZoneId: !Ref CDNHostedZoneId
          DNSName: !GetAtt reportCloudFrontDistribution.DomainName
          EvaluateTargetHealth: false
      - Name: !Ref channelfeedWebsiteName
        Type: A
        AliasTarget:
          HostedZoneId: !Ref CDNHostedZoneId
          DNSName: !GetAtt channelfeedCloudFrontDistribution.DomainName
          EvaluateTargetHealth: false
      - Name: !Ref AuthWebsiteName
        Type: A
        AliasTarget:
          HostedZoneId: !Ref CDNHostedZoneId
          DNSName: !GetAtt AuthCloudFrontDistribution.DomainName
          EvaluateTargetHealth: false
      - Name: !Ref PubchWebsiteName
        Type: A
        AliasTarget:
          HostedZoneId: !Ref CDNHostedZoneId
          DNSName: !GetAtt PubchCloudFrontDistribution.DomainName
          EvaluateTargetHealth: false
Outputs:
  codebuildarn:
    Description: React CodeBuildRole arn
    Value: !GetAtt CodeBuildRole.Arn