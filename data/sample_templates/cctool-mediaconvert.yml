---
AWSTemplateFormatVersion: '2010-09-09'
Description: "Mediaconvert for cctool/feeds assets conversion. NOTE: Ensure the bucket trigger is added manually for the respective lambda functions if buckets do already exist, else uncomment the Lambda thumbnail trigger config and Lambda trigger config part"
Parameters:
  pythonversion:
    Type: String
    Default: null
    Description: 'Python version for the lambda execution'
  lambdafunction:
    Type: String
    Default: null
    Description: 'Enter the lambda function name'
  lambdafunctionthumb:
    Type: String
    Default: null
    Description: 'Enter the lambda function name for the thumbnail conversion'
  srcassetbucket: 
    Description: Enter the source bucket name 
    Type: String
    Default: null
  destassetbucket:
    Description: Enter the destination bucket name 
    Type: String
    Default: null
  codezipbucket:
    Description: Enter the lambda code zip bucket name
    Type: String
    Default: null
  codezippath:
    Description: Enter the lambda code zip bucket path
    Type: String
    Default: null
  assettype:
    Description: Enter the type of asset for mediaconvert
    Type: String
    Default: null
    AllowedValues:
      - cctoolhls
      - feeds
    ConstraintDescription: must specify cctool or feeds.

Mappings:
  Asset:
    cctoolhls:
      tempthumbfoldertrigger: 'temp-thumbnail/'
      uploadbucktrigger: 'video/'
      finalthumbfolder: 'video/'
    feeds:
      tempthumbfoldertrigger: 'temp-thumbnail/'
      uploadbucktrigger: 'media/video/'
      finalthumbfolder: 'media/'

Conditions:
  folder: !Equals [ !Ref assettype, feeds ]

Resources:
  lambdaLogGroup1:
    Type: 'AWS::Logs::LogGroup'
    Properties:
      LogGroupName: !Sub /aws/lambda/${lambdafunction}-${assettype}
      RetentionInDays: 60

  lambdaLogGroup2:
    Type: 'AWS::Logs::LogGroup'
    Properties:
      LogGroupName: !Sub /aws/lambda/${lambdafunctionthumb}-${assettype}
      RetentionInDays: 60

  MediaConvertRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub MediaConvert-${assettype}-${AWS::Region}
      Path: "/service-role/"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: mediaconvert.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - !Ref Mediaconvertpolicy

  Mediaconvertpolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: !Sub MediaConvert-policy-${AWS::Region}
      Path: /service-role/
      PolicyDocument: 
        Version: '2012-10-17'
        Statement: 
          - Effect: Allow
            Action:
            - s3:Get*
            - s3:List*
            Resource: 
            - !Sub arn:aws:s3:::${srcassetbucket}/*
          - Effect: Allow
            Action:
            - s3:Put*
            Resource: 
            - !Sub arn:aws:s3:::${destassetbucket}/*
          
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${lambdafunction}-${assettype}-role-${AWS::Region}
      Path: "/service-role/"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - !Ref Lambdaexecutionpolicy

  Lambdaexecutionpolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: !Sub mediaconvert-${assettype}-lambda-${AWS::Region}
      Path: /service-role/
      PolicyDocument: 
        Version: '2012-10-17'
        Statement: 
          - Effect: Allow
            Action:
            - logs:CreateLogGroup
            Resource: !Sub arn:aws:logs:${AWS::Region}:${AWS::AccountId}:*
          - Effect: Allow
            Action:
            - logs:CreateLogStream
            - logs:PutLogEvents
            Resource: 
            - !Sub arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/${lambdafunction}-${assettype}:*
          - Effect: Allow
            Action:
            - mediaconvert:*
            - s3:ListAllMyBuckets
            - s3:ListBucket
            Resource: 
            - '*'
          - Effect: Allow
            Action:
            - iam:PassRole
            Resource:
            - '*'
            Condition:
              StringLike:
                iam:PassedToService:
                  - mediaconvert.amazonaws.com

  lambdamediaconvert:
    Type: 'AWS::Lambda::Function'
    Properties:
      FunctionName: !Sub ${lambdafunction}-${assettype}
      Handler: 'lambda_function.lambda_handler'
      Role: !GetAtt LambdaExecutionRole.Arn
      Description: !Sub "Mediaconvert for ${assettype} assets"
      Code:
        S3Bucket: !Ref codezipbucket
        S3Key: !Ref codezippath
      Runtime: !Ref pythonversion
      Timeout: 900
      MemorySize: 256
      Architectures:
        - x86_64
      Environment:
        Variables:
          MediaConvertRole: !GetAtt MediaConvertRole.Arn
          destbucket: !Ref destassetbucket

