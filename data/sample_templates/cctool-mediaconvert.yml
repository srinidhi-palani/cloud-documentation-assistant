  LambdaExecutionRolethumb:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${lambdafunctionthumb}-${assettype}-role-${AWS::Region}
      Path: "/service-role/"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - !Ref LambdaExecutionRolethumbpolicy

  LambdaExecutionRolethumbpolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: !Sub mediaconvert-${assettype}thumbail-lambda-${AWS::Region}
      Path: /service-role/
      PolicyDocument: 
        Version: '2012-10-17'
        Statement: 
          - Effect: Allow
            Action:
            - logs:CreateLogGroup
            Resource: !Sub arn:aws:logs:${AWS::Region}:${AWS::AccountId}:*
          - Effect: Allow
            Action:
            - logs:CreateLogStream
            - logs:PutLogEvents
            Resource: 
            - !Sub arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/${lambdafunctionthumb}-${assettype}:*
          - Effect: Allow
            Action:
            - s3:GetObject
            - s3:PutObject
            - s3:ListBucket
            Resource: 
            - !Sub arn:aws:s3:::${destassetbucket}
            - !Sub arn:aws:s3:::${destassetbucket}/temp-thumbnail/*
            - Fn::Sub: 
              - |-
                arn:aws:s3:::${destassetbucket}/${AssetPath}*
              - AssetPath: !FindInMap [Asset, !Ref assettype, finalthumbfolder]


  lambdamediaconvertthumb:
    Type: 'AWS::Lambda::Function'
    Properties:
      FunctionName: !Sub ${lambdafunctionthumb}-${assettype}
      Handler: 'index.lambda_handler'
      Role: !GetAtt LambdaExecutionRolethumb.Arn
      Description: !Sub Mediaconvert for ${assettype} assets thumbnail
      Code:
        S3Bucket: !Ref codezipbucket
        S3Key: !Ref codezippath
      Runtime: !Ref pythonversion
      Timeout: 300
      MemorySize: 128
      Architectures:
        - x86_64
      Code:
        ZipFile:
          Fn::Sub:
          - |-
              import boto3
              import os
              
              s3 = boto3.client('s3')
              
              def lambda_handler(event, context):
                  bucket_name = event['Records'][0]['s3']['bucket']['name']
                  key = event['Records'][0]['s3']['object']['key']
                  print(bucket_name)
                  print(key)
                  
                  try:
                      # Extract the file name without the extension and file name trim
                      file_name_without_extension = key.rsplit('.', 1)[0]
                      print('file_name_without_extension ->'+file_name_without_extension)
                      file_name_rename = file_name_without_extension.rsplit('.', 1)[0]
                      print('file_name_rename ->'+file_name_rename)
                      
                      # Find the numeric part of the file name
                      numeric_part = int(file_name_without_extension.split('.')[-1])
                      
                      # Increment the numeric part
                      new_numeric_part = numeric_part + 1
                      
                      # Create the new file name
                      srcthumb = file_name_rename.split('/', 1)[1]
                      thumbfolder = "${folder}"+srcthumb
                      print('thumbfolder ->'+thumbfolder)
                      new_file_name = f"{thumbfolder}_{new_numeric_part:05d}.png"
                      print('new_file_name ->'+new_file_name)
                      
                      # Copy the file to the new name
                      s3.copy_object(
                          Bucket=bucket_name,
                          CopySource=f'{bucket_name}/{key}',
                          Key=new_file_name
                      )
                  
                      return {
                          'statusCode': 200,
                          'body': f'File renamed from {key} to {new_file_name}'
                      }
                  except Exception as e:
                      print ('Exception: %s' % e)
                      statusCode = 500
                      raise
          - folder: !FindInMap [Asset, !Ref assettype, finalthumbfolder]

