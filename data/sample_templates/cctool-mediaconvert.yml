Outputs:
  lambdaIAMrole:
    Description: lambda IAM role for mediaconvert
    Value: !GetAtt LambdaExecutionRole.Arn
  lambdathumbIAMrole:
    Description: lambda thumbnail IAM role for mediaconvert
    Value: !GetAtt LambdaExecutionRolethumb.Arn
  mediaconvertIAMrole:
    Description: Mediaconvert IAM role
    Value: !GetAtt MediaConvertRole.Arn