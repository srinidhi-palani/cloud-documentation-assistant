    Description: No.of docker images to retain in each ecr repo
    Type: String
    Default: null

  cloudfrontkey:
    Description: Pem key file name for cloudfront of root user
    Type: String
    Default: null

  ssiapiecr:
    Description: SSI api ecr repo name
    Type: String
    Default: null

  feedsapiecr:
    Description: Feeds api ecr repo name
    Type: String
    Default: null

  courseengineapiecr:
    Description: courseengineapireact ecr repo name
    Type: String
    Default: null

  courseengineapiv2ecr:
