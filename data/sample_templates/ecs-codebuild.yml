  CodePipelineECSAPIdeployRole:
    Type: AWS::IAM::Role
    DependsOn: Codepipelinepolicy
    Properties:
      RoleName: !Sub ${CodePipelinerolename}-role-${AWS::Region}
      Path: "/service-role/"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: codepipeline.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - !Ref Codepipelinepolicy

  Codepipelinepolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: !Sub ${CodePipelinerolename}-policy-${AWS::Region}
      Path: /service-role/
      PolicyDocument:
        Version: "2012-10-17"
        Statement: 
          - Effect: Allow
            Action:
              - 'codecommit:CancelUploadArchive'
              - 'codecommit:GetBranch'
              - 'codecommit:GetCommit'
              - 'codecommit:GetUploadArchiveStatus'
              - 'codecommit:UploadArchive'
            Resource: '*'
            Condition:
              StringEquals:
                aws:RequestedRegion: !Sub ${AWS::Region}
          - Effect: Allow
            Action:
              - 'codebuild:BatchGetBuilds'
              - 'codebuild:StartBuild'
            Resource:
              - !GetAtt 'SSIAPICodeBuildECR.Arn'
              - !GetAtt 'FeedsAPICodeBuildECR.Arn'
              - !GetAtt 'CourseengineAPICodeBuildECR.Arn'
              - !GetAtt 'CourseengineAPIv2CodeBuildECR.Arn'
              - !GetAtt 'CapsulerengineAPICodeBuildECR.Arn'
              - !GetAtt 'NotifyAPICodeBuildECR.Arn'
          - Effect: Allow
            Action:
              - 'iam:PassRole'                  
              - 'codestar-connections:UseConnection'
            Resource: '*'
          - Effect: Allow
            Action:
              - 'appconfig:StartDeployment'
              - 'appconfig:GetDeployment'
              - 'appconfig:StopDeployment'
            Resource: '*'
          - Effect: Allow
            Action:
              - 'ec2:*'
              - 'elasticloadbalancing:*'
              - 'autoscaling:*'
              - 'cloudwatch:*'
              - 's3:*'
              - 'sns:*'
              - 'cloudformation:*'
              - 'ecs:*'
            Resource: '*'
            Condition:
              StringEquals:
                aws:RequestedRegion: !Sub ${AWS::Region}
Outputs:
  CodePipelineECSAPIdeployRole:
    Description: ECS CodePipeline role arn
    Value: !Ref CodePipelineECSAPIdeployRole
    Export:
      Name: CodePipelineECSapi-role