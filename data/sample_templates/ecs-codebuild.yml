  CodeBuildRole:
    Type: AWS::IAM::Role
    DependsOn: Codebuildpolicy
    Properties:
      RoleName: !Sub ${CodeBuildrolename}-role-${AWS::Region}
      Path: "/service-role/"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: codebuild.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - !Ref Codebuildpolicy

  Codebuildpolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: !Sub ${CodeBuildrolename}-policy-${AWS::Region}
      Path: /service-role/
      PolicyDocument:
        Version: "2012-10-17"
        Statement: 
          - Effect: Allow
            Action:
            - ecr:GetAuthorizationToken
            Resource: "*"
            Condition:
              StringEquals:
                aws:RequestedRegion: !Sub ${AWS::Region}
          - Effect: Allow
            Action:
              - "logs:CreateLogGroup"
              - "logs:CreateLogStream"
              - "logs:PutLogEvents" 
            Resource: 
              - !Sub arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/codebuild/*
          - Effect: Allow
            Action:
              - ecr:ListImages                  
              - ecr:BatchCheckLayerAvailability
              - ecr:GetDownloadUrlForLayer
              - ecr:GetRepositoryPolicy
              - ecr:DescribeRepositories
              - ecr:ListImages
              - ecr:DescribeImages
              - ecr:BatchGetImage
              - ecr:InitiateLayerUpload
              - ecr:UploadLayerPart
              - ecr:CompleteLayerUpload
              - ecr:PutImage
            Resource:
              - !Sub arn:aws:ecr:${AWS::Region}:${AWS::AccountId}:repository/${nodejsreponame}
              - !GetAtt 'SSIECR.Arn'
              - !GetAtt 'Feeds.Arn'
              - !GetAtt 'Courseengine.Arn'
              - !GetAtt 'Courseenginev2.Arn'
              - !GetAtt 'Capsuleeng.Arn'
              - !GetAtt 'Notification.Arn'
          - Effect: Allow
            Action:
              - s3:ListBucket
              - s3:GetObject
              - s3:PutObject
              - s3:GetObjectVersion
              - s3:GetBucketAcl
              - s3:GetBucketLocation
            Resource:
              - !Sub "arn:aws:s3:::${envbucket}"
              - !Sub "arn:aws:s3:::${envbucket}/*"
              - !Sub "arn:aws:s3:::codepipeline-${AWS::Region}-${AWS::AccountId}-artifact"
              - !Sub "arn:aws:s3:::codepipeline-${AWS::Region}-${AWS::AccountId}-artifact/*"
          - Effect: Allow
            Action: 
              - ssm:GetParameter
              - ssm:GetParameters
              - ssm:GetParametersByPath
              - ssm:PutParameter
            Resource: 
              - !Sub arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/*
          - Effect: Allow
            Action: 
              - cloudformation:*
            Resource: "*"
          - Effect: Allow
            Action:
              - iam:PassRole
            Resource: "*"
          - Effect: Allow
            Action:
              - s3:ListBucket
              - s3:GetObject
              - s3:PutObject
              - s3:GetObjectVersion
              - s3:GetBucketAcl
              - s3:GetBucketLocation
            Resource: "*"
          - Effect: Allow
            Action:
              - iam:CreateRole
              - iam:DeleteRole
              - iam:GetRole
              - iam:UpdateAssumeRolePolicy
              - iam:PutRolePolicy
              - iam:AttachRolePolicy
              - iam:DetachRolePolicy
              - iam:DeleteRolePolicy
            Resource: "*"
          - Effect: Allow
            Action: 
              - ec2:DescribeVpnGateways
              - ec2:CreateNetworkInterfacePermission
              - ec2:DescribeVpcs
              - ec2:DescribeSubnets
              - ec2:DescribeSecurityGroups
              - ec2:DescribeInternetGateways
              - ec2:DescribeNatGateways
              - ec2:DescribeRouteTables
              - ec2:DescribeNetworkInterfaces
              - ec2:CreateNetworkInterface
              - ec2:DeleteNetworkInterface
              - ec2:DescribeNetworkInterfaceAttribute
              - ec2:ModifyNetworkInterfaceAttribute
            Resource: "*"
            Condition:
              StringEquals:
                ec2:Region:  !Sub "${AWS::Region}"

  ssiapiloggroup:
    Type: 'AWS::Logs::LogGroup'
    Properties:
      LogGroupName: !Sub /aws/codebuild/${ssiapicodebuildecr}
      RetentionInDays: !Ref logretention

  SSIAPICodeBuildECR:
    Type: 'AWS::CodeBuild::Project'
    Properties:
      Name: !Ref 'ssiapicodebuildecr'
      ServiceRole: !GetAtt 'CodeBuildRole.Arn'
      Artifacts:
        Type: no_artifacts
      Environment:
        ComputeType: BUILD_GENERAL1_SMALL 
        Type: !Ref Codebuildecomputeenvtype
        ImagePullCredentialsType: CODEBUILD
        PrivilegedMode: true
        Image: !Ref Codebuildimage
      LogsConfig:
        CloudWatchLogs:
          Status: ENABLED
          GroupName: !Ref ssiapiloggroup
      Triggers:
        Webhook: false
      TimeoutInMinutes: 10
      Source:
        Auth:
          Type: OAUTH
        Location: !Ref SSIGithubRepo
        Type: GITHUB     
        BuildSpec: !Sub |
             version: 0.2
             env:
               variables:
                 REPOSITORY_URI: "${SSIECR.RepositoryUri}"
             phases:
               install:
                 commands:
                   - nohup /usr/local/bin/dockerd --host=unix:///var/run/docker.sock --host=tcp://127.0.0.1:2375 --storage-driver=overlay2 &
                   - timeout 15 sh -c "until docker info; do echo .; sleep 1; done"
               pre_build:
                 commands:
                   - aws s3 cp ${ssiapienv} . --recursive
                   - mv ${cloudfrontkey} shared/${cloudfrontkey}
                   - aws ecr get-login-password --region ${AWS::Region} | docker login --username AWS --password-stdin ${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com
                   - echo Logged in to Amazon ECR...
               build:
                 commands:
                   - echo Building Docker image...
                   - tag=$(TZ="Asia/Kolkata" date +%d-%m-%y_%k-%M | sed 's/[[:space:]]//g')
                   - docker build -f ${ssidockerfile} -t $REPOSITORY_URI:$tag .
                   - echo Completed building the image...
               post_build:
                 commands:
                   - echo Pushing the Docker image...
                   - docker push $REPOSITORY_URI:$tag
                   - echo Writing image definitions file...
                   - printf '[{"name":"ssi","imageUri":"%s"}]' $REPOSITORY_URI:$tag > imagedefinitions.json
                   - cat imagedefinitions.json
                   - echo Completed pushing the image to ECR...
             artifacts:
                 files:
                   - imagedefinitions.json

