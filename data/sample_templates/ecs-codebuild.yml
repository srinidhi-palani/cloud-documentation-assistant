    Type: String
    Default: null

  notifyengapicodebuildecr:
    Description: notifyapiecr api codebuild name
    Type: String
    Default: null

  SSIGithubRepo:
    Type: String
    Description: ssiapi gitgub repo
    Default: null

  FeedsGithubRepo:
    Type: String
    Description: feedsapi github repo       
    Default: null

  courseengineGithubRepo:
    Type: String
    Description: courseengineapi github repo
    Default: null

  courseenginev2GithubRepo:
    Type: String
    Description: courseengineapi v2 github repo
    Default: null

  capsuleengGithubRepo:
    Type: String
    Description: capusleengine api github repo
    Default: null

  notifyGithubRepo:
    Type: String
    Description: notification engine api github repo
    Default: null

  envbucket:
    Description: env s3 bucket name for iam permission
    Type: String
    Default: null

  ssiapienv:
    Description: Enter the ssiapi folder path for .env and dockerfile
    Type: String 
    Default: null

  feedsapienv:
    Description: Enter the feedsapi folder path for .env and dockerfile
    Type: String
    Default: null

  courseengapienv:
    Description: Enter the courseengapi folder path for .env and dockerfile
    Type: String
    Default: null

  courseengapiv2env:
    Description: Enter the courseengapiv2api folder path for .env and dockerfile
    Type: String
    Default: null

  capsengapienv:
    Description: Enter the capusle engine api folder path for .env and dockerfile
    Type: String
    Default: null

  notifyapienv:
    Description: Enter the notification api folder path for index.ts and dockerfile
    Type: String
    Default: null
  
  ssidockerfile:
    Description: Enter the api dockerfile 
    Type: String
    Default: null

  feedsdockerfile:
    Description: Enter the feeds dockerfile
    Type: String
    Default: null

  courseengapidockerfile:
    Description: Enter the courseengapi dockerfile
    Type: String
    Default: null

  courseenginev2dockerfile:
    Description: Enter the courseenginev2 dockerfile
    Type: String
    Default: null

  capsengapidockerfile:
    Description: Enter the capsuleengapi dockerfile
    Type: String
    Default: null

  notifyapidockerfile:
    Description: Enter the notification api dockerfile
    Type: String
    Default: null

  logretention:
    Type: Number
    Description: Enter the cloudwatch log retention period in days
    Default: null

  nodejsreponame:
    Type: String
    Description: Enter the nodejs ecr repo name
    Default: null

  CodeBuildrolename:
    Description: Enter the codebuild role name 
    Type: String
    Default: null

  CodePipelinerolename:
    Description: Enter the codepipeline role name 
    Type: String
    Default: null
  
  Codebuildimage:
    Description: Enter the codebuild compute image
    Type: String
    Default: null
  
  Codebuildecomputeenvtype:
    Description: Enter the codebuild compute environment type
    Type: String
    Default: null
Resources:
  SSIECR:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Ref ssiapiecr
      LifecyclePolicy:
        LifecyclePolicyText: !Sub |
            {
                "rules": [
                    {
                        "rulePriority": 1,
                        "description": "Retaining the first ${ecrimageretain} images",
                        "selection": {
                            "tagStatus": "any",
                            "countType": "imageCountMoreThan",
                            "countNumber": ${ecrimageretain}
                        },
                        "action": {
                            "type": "expire"
                        }
                    }
                ]
            }  
      RepositoryPolicyText: !Sub |
            {
              "Version": "2012-10-17",
              "Statement": [
                {
                  "Sid": "AllowPushPull",
                  "Effect": "Allow",
                  "Principal": {
                    "AWS": "arn:aws:iam::${AWS::AccountId}:root"
                  },
                  "Action": [
                    "ecr:GetDownloadUrlForLayer",
                    "ecr:BatchGetImage",
                    "ecr:BatchCheckLayerAvailability",
                    "ecr:PutImage",
                    "ecr:InitiateLayerUpload",
                    "ecr:UploadLayerPart",
                    "ecr:CompleteLayerUpload"
                  ]
                }
              ]
            }

