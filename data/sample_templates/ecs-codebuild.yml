    Type: 'AWS::Logs::LogGroup'
    Properties:
      LogGroupName: !Sub /aws/codebuild/${capsuleengapicodebuildecr}
      RetentionInDays: !Ref logretention

  CapsulerengineAPICodeBuildECR:
    Type: 'AWS::CodeBuild::Project'
    Properties:
      Name: !Ref 'capsuleengapicodebuildecr'
      ServiceRole: !GetAtt 'CodeBuildRole.Arn'
      Artifacts:
        Type: no_artifacts
      Environment:
        ComputeType: BUILD_GENERAL1_SMALL
        Type: !Ref Codebuildecomputeenvtype
        ImagePullCredentialsType: CODEBUILD
        PrivilegedMode: true
        Image: !Ref Codebuildimage
      LogsConfig:
        CloudWatchLogs:
          Status: ENABLED
          GroupName: !Ref capsuleengineapiloggroup
      Triggers:
        Webhook: false
      TimeoutInMinutes: 10
      Source:
        Auth:
          Type: OAUTH
        Location: !Ref capsuleengGithubRepo
        Type: GITHUB     
        BuildSpec: !Sub |
             version: 0.2
             env:
               variables:
                 REPOSITORY_URI: "${Capsuleeng.RepositoryUri}"
             phases:
               install:
                 commands:
                   - nohup /usr/local/bin/dockerd --host=unix:///var/run/docker.sock --host=tcp://127.0.0.1:2375 --storage-driver=overlay2 &
                   - timeout 15 sh -c "until docker info; do echo .; sleep 1; done"
               pre_build:
                 commands:
                   - aws s3 cp ${capsengapienv} . --recursive
                   - mv ${cloudfrontkey} shared/${cloudfrontkey}
                   - aws ecr get-login-password --region ${AWS::Region} | docker login --username AWS --password-stdin ${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com
                   - echo Logged in to Amazon ECR...
               build:
                 commands:
                   - echo Building Docker image...
                   - tag=$(TZ="Asia/Kolkata" date +%d-%m-%y_%k-%M | sed 's/[[:space:]]//g')
                   - docker build -f ${capsengapidockerfile} -t $REPOSITORY_URI:$tag .
                   - echo Completed building the image...
               post_build:
                 commands:
                   - echo Pushing the Docker image...
                   - docker push $REPOSITORY_URI:$tag
                   - echo Writing image definitions file...
                   - printf '[{"name":"capsuleengine","imageUri":"%s"}]' $REPOSITORY_URI:$tag > imagedefinitions.json
                   - cat imagedefinitions.json
                   - echo Completed pushing the image to ECR...
             artifacts:
                 files:
                   - imagedefinitions.json

