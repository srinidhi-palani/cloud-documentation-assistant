---
AWSTemplateFormatVersion: 2010-09-09
Description: "This template creates an ecs cluster to for api within the 1st 3 AZ's of private subnet. **Services used in template:ecs cluster,load balancer,cloudwatchloggroup,ec2 launch template,autoscaling group,securitygroup,route53**"
Parameters:
  ECSCluster:
    Type: String
    Default: null
    Description: ECS cluster name

  KeyName:
    Type: 'AWS::EC2::KeyPair::KeyName'
    Default: null
    Description: Amazon EC2 Key Pair.

  VpcId:
    Type: 'String'
    Default: null
    Description: Select a VPC that allows instances to access the Internet.

  publicsubnetid:
    Type: 'List<AWS::EC2::Subnet::Id>'
    Default: null
    Description: Enter 3 public subnets which are in each az for loadbalancer

  privatesubnetid:
    Type: 'List<AWS::EC2::Subnet::Id>'
    Default: null
    Description: Enter 3 private subnets which are in each az for ec2.

  DesiredCapacityec2:
    Type: Number
    Default: null
    Description: Number of desired instances to launch in autoscaling group.

  DesiredCapacity:
    Type: Number
    Default: null
    Description: Number of desired docker containers to launch in your ECS cluster per service.

  MaxSize:
    Type: Number
    Default: null
    Description: Maximum number of instances that can be launched in your ECS cluster.

  ContainerMaxCapacity:
    Type: Number
    Default: null
    Description: Enter the maximum number of container to run per api 
   
  logretention:
    Type: Number
    Default: null
    Description: Enter the cloudwatch log retention in days for ecs task

  LoadBalancerName:
    Type: String
    Default: null
    Description: Load balancer name to create
      
  Certificate:
    Type: String
    Default: null
    Description: Enter the Certificate arn for domain

  ssiecrimage:
    Type: String
    Default: null
    Description: ECR image for ssiapi with tag

  ssiport:
    Type: Number
    Default: null
    Description: Port number for ssi api

  ssiapiurl:
    Type: String
    Default: null
    Description: ssi api url

  ssihealthcheckpath:
    Type: String
    Default: null
    Description: health check path for ssiapi

  ssisercon:
    Type: String
    Default: null
    Description: ssi api docker container and ecs service name

  ssipriority:
    Type: Number
    Default: null
    Description: Load balancer rule priority for ssi api

  feedsecrimage:
