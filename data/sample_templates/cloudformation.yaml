  ECSServiceRole:
    Type: 'AWS::IAM::Role'
    Properties:
      AssumeRolePolicyDocument:
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ecs.amazonaws.com
            Action:
              - 'sts:AssumeRole'
      Path: /
      Policies:
        - PolicyName: ecs-service-use1
          PolicyDocument:
            Statement:
              - Effect: Allow
                Action:
                  - 'elasticloadbalancing:DeregisterInstancesFromLoadBalancer'
                  - 'elasticloadbalancing:DeregisterTargets'
                  - 'elasticloadbalancing:Describe*'
                  - 'elasticloadbalancing:RegisterInstancesWithLoadBalancer'
                  - 'elasticloadbalancing:RegisterTargets'
                  - 'ec2:Describe*'
                  - 'ec2:AuthorizeSecurityGroupIngress'
                  - 'ecs:ListTasks'
                  - 'ecs:Describe*'
                Resource: '*'


  EC2Role:
  Type: AWS::IAM::Role
  Properties:
    AssumeRolePolicyDocument:
      Version: "2012-10-17"
      Statement:
        - Effect: Allow
          Principal:
            Service:
              - ec2.amazonaws.com
          Action:
            - sts:AssumeRole
    Path: /
    ManagedPolicyArns:
      - !Ref ec2ManagedPolicy

  ec2ManagedPolicy:
    Type: AWS::IAM::ManagedPolicy
    DependsOn: CompanyAssetBucket
    Properties:
      ManagedPolicyName: ecs-api-policy
      Path: /service-role/
      PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: ECS
                Effect: Allow
                Action:
                  - elasticloadbalancing:DeregisterInstancesFromLoadBalancer
                  - elasticloadbalancing:DeregisterTargets
                  - elasticloadbalancing:Describe*
                  - elasticloadbalancing:RegisterInstancesWithLoadBalancer
                  - elasticloadbalancing:RegisterTargets
                  - ec2:Describe*
                  - ec2:AuthorizeSecurityGroupIngress
                  - ecs:ListTasks
                  - ecs:CreateCluster
                  - ecs:DeregisterContainerInstance
                  - ecs:DiscoverPollEndpoint
                  - ecs:Poll
                  - ecs:RegisterContainerInstance
                  - ecs:StartTelemetrySession
                  - ecs:Submit*
                  - ecs:Describe*
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                  - ecr:GetAuthorizationToken
                  - ecr:BatchCheckLayerAvailability
                  - ecr:BatchGetImage
                  - ecr:GetDownloadUrlForLayer
                Resource: "*"

              - Sid: MediaConvertAccess
                Effect: Allow
                Action:
                  - mediaconvert:DescribeEndpoints
                  - mediaconvert:ListJobs
                  - mediaconvert:GetJob
                Resource: "*"

              - Sid: DynamoDB
                Effect: Allow
                Action:
                  - dynamodb:BatchWriteItem
                  - dynamodb:PutItem
                  - dynamodb:DeleteItem
                  - dynamodb:GetItem
                  - dynamodb:Scan
                  - dynamodb:Query
                  - dynamodb:UpdateItem
                  - dynamodb:UpdateTable
                  - dynamodb:ListTables
                  - dynamodb:GetRecords
                Resource:
                  - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${DynamoDBTableName}"

              - Sid: EventBridgeActions
                Effect: Allow
                Action:
                  - events:*
                  - schemas:*
                  - scheduler:*
                  - pipes:*
                Resource: "*"

              - Sid: SNS
                Effect: Allow
                Action:
                  - sns:Publish
                  - sns:CreatePlatformEndpoint
                Resource:
                  - !Ref SNSApnsArn
                  - !Ref SNSGcmArn

              - Sid: ParameterStore
                Effect: Allow
                Action:
                  - ssm:DescribeParameters
                  - ssm:GetParameters
                Resource: "*"

              - Sid: CompanyAssetsS3
                Effect: Allow
                Action:
                  - s3:AbortMultipartUpload
                  - s3:GetObjectVersionAcl
                  - s3:GetObjectTagging
                  - s3:PutObjectTagging
                  - s3:PutObjectVersionTagging
                  - s3:ListMultipartUploadParts
                  - s3:PutObject
                  - s3:GetObject
                  - s3:GetObjectTorrent
                  - s3:PutObjectRetention
                  - s3:GetObjectVersionForReplication
                  - s3:ReplicateDelete
                  - s3:PutObjectAcl
                  - s3:PutObjectVersionAcl
                  - s3:GetObjectVersion
                  - s3:GetBucketLocation
                  - s3:ListBucket
                Resource:
                  - !Sub "arn:aws:s3:::${CompanyAssetsBucket}"
                  - !Sub "arn:aws:s3:::${CompanyAssetsBucket}/*"

              - Sid: Impress
                Effect: Allow
                Action:
                  - s3:GetObjectVersionAcl
                  - s3:GetObjectTagging
                  - s3:ListMultipartUploadParts
                  - s3:GetObject
                  - s3:GetObjectVersionForReplication
                  - s3:GetBucketLocation
                  - s3:ListBucket
                Resource:
                  - !Sub "arn:aws:s3:::${ImpressBucket}"
                  - !Sub "arn:aws:s3:::${ImpressBucket}/*"

  AutoscalingRole:
    Type: 'AWS::IAM::Role'
    Properties:
      AssumeRolePolicyDocument:
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - application-autoscaling.amazonaws.com
            Action:
              - 'sts:AssumeRole'
      Path: /
      Policies:
        - PolicyName: service-autoscaling-use1
          PolicyDocument:
            Statement:
              - Effect: Allow
                Action:
                  - 'application-autoscaling:*'
                  - 'cloudwatch:DescribeAlarms'
                  - 'cloudwatch:PutMetricAlarm'
                  - 'ecs:DescribeServices'
                  - 'ecs:UpdateService'
                Resource: '*'

