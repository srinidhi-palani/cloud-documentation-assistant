    Default: null
    Description: Enter the route53 hosted zone id
    
Mappings:
  AWSRegionToAMI:
    us-east-1:
      AMIID: ami-0fa1ca9559f1892ec
    eu-central-1:
      AMIID: ami-0444794b421ec32e4
    ap-south-1:
      AMIID: ami-03cb1380eec7cc118

  Environments:
    QA:
      instancetype: 't4g.small'
      dockercpu: '256'
      dockermemory: '512'
    UAT:
      instancetype: 't4g.small'
      dockercpu: '300'
      dockermemory: '512'
    Prod:
      instancetype: 't4g.medium'
      dockercpu: '360'
      dockermemory: '720'

Resources:
  Cluster:
    Type: 'AWS::ECS::Cluster'
    Properties:
      ClusterName: !Ref ECSCluster
      ClusterSettings:
       - Name: containerInsights
         Value: enabled

  EcsSecurityGroup:
    Type: 'AWS::EC2::SecurityGroup'
    Properties:
      GroupName: !Sub ${ECSCluster}-api
      GroupDescription: !Sub Security Group for ${ECSCluster} ECS cluster and ${LoadBalancerName} loadbalancer.
      VpcId: !Ref VpcId
      SecurityGroupIngress:
      - IpProtocol: tcp
        FromPort: !Ref ssiport
        ToPort: !Ref ssiport
        CidrIp:  0.0.0.0/0
        Description: ssi port 
      - IpProtocol: tcp
        FromPort: !Ref feedsport
        ToPort: !Ref feedsport
        CidrIp:  0.0.0.0/0
        Description: feeds port
      - IpProtocol: tcp
        FromPort: !Ref courseengineport
        ToPort: !Ref courseengineport
        CidrIp:  0.0.0.0/0
        Description: courseengine port
      - IpProtocol: tcp
        FromPort: !Ref courseenginev2Port
        ToPort: !Ref courseenginev2Port
        CidrIp:  0.0.0.0/0
        Description: courseenginev2 port
      - IpProtocol: tcp
        FromPort: !Ref capsuleenginePort
        ToPort: !Ref capsuleenginePort
        CidrIp:  0.0.0.0/0
        Description: capsuleengine port
      - IpProtocol: tcp
        FromPort: !Ref tysimportuserport
        ToPort: !Ref tysimportuserport
        CidrIp:  0.0.0.0/0
        Description: importuser port
      - IpProtocol: tcp
        FromPort: !Ref tysuserport
        ToPort: !Ref tysuserport
        CidrIp:  0.0.0.0/0
        Description: user port
      - IpProtocol: tcp
        FromPort: !Ref tysproductport
        ToPort: !Ref tysproductport
        CidrIp:  0.0.0.0/0
        Description: product port
      - IpProtocol: tcp
        FromPort: !Ref tyschannelport
        ToPort: !Ref tyschannelport
        CidrIp:  0.0.0.0/0
        Description: channel port
      - IpProtocol: tcp
        FromPort: !Ref tyscoursetrackcomport
        ToPort: !Ref tyscoursetrackcomport
        CidrIp:  0.0.0.0/0
        Description: tyscoursetrackcomport 
      - IpProtocol: tcp
        FromPort: !Ref tyscoursetrackport
        ToPort: !Ref tyscoursetrackport
        CidrIp:  0.0.0.0/0
        Description: tyscoursetrackport 
      - IpProtocol: tcp
        FromPort: !Ref tyshabitcardport
        ToPort: !Ref tyshabitcardport
        CidrIp:  0.0.0.0/0
        Description: habitcard port 
      - IpProtocol: tcp
        FromPort: !Ref tysemailport
        ToPort: !Ref tysemailport
        CidrIp:  0.0.0.0/0
        Description: email port   
      - IpProtocol: tcp
        FromPort: !Ref tystrialsignupport
        ToPort: !Ref tystrialsignupport
        CidrIp:  0.0.0.0/0
        Description: trialsignup port 
      - IpProtocol: tcp
        FromPort: !Ref tysnotificationport
        ToPort: !Ref tysnotificationport
        CidrIp:  0.0.0.0/0
        Description: notification port   
      - IpProtocol: tcp
        FromPort: !Ref tysinappnotificationport
        ToPort: !Ref tysinappnotificationport
        CidrIp:  0.0.0.0/0
        Description: inappnotification port 
      - IpProtocol: tcp
        FromPort: !Ref tyscrs3port
        ToPort: !Ref tyscrs3port
        CidrIp:  0.0.0.0/0
        Description: crs3 port    
      - IpProtocol: tcp
        FromPort: !Ref tyssurveyport
        ToPort: !Ref tyssurveyport
        CidrIp:  0.0.0.0/0
        Description: survey port  
      - IpProtocol: tcp
        FromPort: !Ref tystrainingport
        ToPort: !Ref tystrainingport
        CidrIp:  0.0.0.0/0
        Description: training port 
      - IpProtocol: tcp
        FromPort: !Ref tysapigatewayport
        ToPort: !Ref tysapigatewayport
        CidrIp:  0.0.0.0/0
        Description: apigateway port                                                           
      - IpProtocol: tcp
        FromPort: 80
        ToPort: 80
        CidrIp: 0.0.0.0/0
      - IpProtocol: tcp
        FromPort: 443
        ToPort: 443
        CidrIp: 0.0.0.0/0
      - IpProtocol: tcp
        FromPort: 22
        ToPort: 22
        CidrIp: 192.168.0.0/21

  ECSCloudwatchLogsGroup:
    Type: 'AWS::Logs::LogGroup'
    Properties:
      LogGroupName: !Sub ECS-${ECSCluster}
      RetentionInDays: !Ref logretention

  ssitaskdefinition:
    Type: 'AWS::ECS::TaskDefinition'
    Properties:
      Family: 'ssiapi'
      ContainerDefinitions:
        - Name: !Ref ssisercon
          Cpu: !FindInMap
           - Environments
           - !Ref environmenttype
           - dockercpu
          Memory: !FindInMap
           - Environments
           - !Ref environmenttype
           - dockermemory
          Essential: 'true'
          Image: !Ref ssiecrimage
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-create-group: 'True'
              awslogs-group: !Ref ECSCloudwatchLogsGroup
              awslogs-region: !Ref 'AWS::Region'
              awslogs-stream-prefix: !Sub ${ssisercon}-api
          PortMappings:
            - ContainerPort: !Ref ssiport
              HostPort: !Ref ssiport

  feedstaskdefinition:
    Type: 'AWS::ECS::TaskDefinition'
    Properties:
      Family: 'feedsapi'
      ContainerDefinitions:
        - Name: !Ref feedssercon
          Cpu: !FindInMap
           - Environments
           - !Ref environmenttype
           - dockercpu
          Memory: !FindInMap
           - Environments
           - !Ref environmenttype
           - dockermemory
          Essential: 'true'
          Image: !Ref feedsecrimage
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-create-group: 'True'
              awslogs-group: !Ref ECSCloudwatchLogsGroup
              awslogs-region: !Ref 'AWS::Region'
              awslogs-stream-prefix: !Sub ${feedssercon}-api
          PortMappings:
            - ContainerPort: !Ref feedsport
              HostPort: !Ref feedsport

  courseenginetaskdefinition:
    Type: 'AWS::ECS::TaskDefinition'
    Properties:
      Family: 'courseengineapi'
      ContainerDefinitions:
        - Name: !Ref courseenginesercon
          Cpu: !FindInMap
           - Environments
           - !Ref environmenttype
           - dockercpu
          Memory: !FindInMap
           - Environments
           - !Ref environmenttype
           - dockermemory
          Essential: 'true'
          Image: !Ref courseengineecrimage
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-create-group: 'True'
              awslogs-group: !Ref ECSCloudwatchLogsGroup
              awslogs-region: !Ref 'AWS::Region'
              awslogs-stream-prefix: !Sub ${courseenginesercon}-api
          PortMappings:
            - ContainerPort: !Ref courseengineport
              HostPort: !Ref courseengineport

  courseenginev2taskdefinition:
    Type: 'AWS::ECS::TaskDefinition'
    Properties:
      Family: 'courseenginev2api'
      ContainerDefinitions:
        - Name: !Ref courseenginev2sercon
          Cpu: !FindInMap
           - Environments
           - !Ref environmenttype
           - dockercpu
          Memory: !FindInMap
           - Environments
           - !Ref environmenttype
           - dockermemory
          Essential: 'true'
          Image: !Ref courseenginev2ecrimage
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-create-group: 'True'
              awslogs-group: !Ref ECSCloudwatchLogsGroup
              awslogs-region: !Ref 'AWS::Region'
              awslogs-stream-prefix: !Sub ${courseenginev2sercon}-api
          PortMappings:
            - ContainerPort: !Ref courseenginev2Port
              HostPort: !Ref courseenginev2Port     

  capsuleenginetaskdefinition:
    Type: 'AWS::ECS::TaskDefinition'
    Properties:
      Family: 'capsuleengineapi'
      ContainerDefinitions:
        - Name: !Ref capsuleenginesercon
          Cpu: !FindInMap
           - Environments
           - !Ref environmenttype
           - dockercpu
          Memory: !FindInMap
           - Environments
           - !Ref environmenttype
           - dockermemory
          Essential: 'true'
          Image: !Ref capsuleengineecrimage
          LogConfiguration:
            LogDriver: awslogs
            Options:
