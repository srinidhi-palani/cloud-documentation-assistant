  ECSALB:
    Type: 'AWS::ElasticLoadBalancingV2::LoadBalancer'
    Properties:
      Name: !Ref LoadBalancerName
      Scheme: internet-facing
      Type: application
      IpAddressType: ipv4
      LoadBalancerAttributes:
        - Key: "deletion_protection.enabled"
          Value: "true"
      Subnets: !Ref publicsubnetid
      SecurityGroups:
        - !Ref EcsSecurityGroup

  HTTPLoadBalancerListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    DependsOn: ECSServiceRole
    Properties:
      LoadBalancerArn: !Ref ECSALB
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: redirect
          RedirectConfig:
           Protocol: "HTTPS"
           Port: "443"
           Host: "#{host}"
           Path: "/#{path}"
           Query: "#{query}"
           StatusCode: "HTTP_301"

  HTTPSLoadBalancerListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    DependsOn: ECSServiceRole
    Properties:
      LoadBalancerArn: !Ref ECSALB
      Port: 443
      Protocol: HTTPS
      Certificates:
        - CertificateArn: !Ref Certificate
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref SSIAPITargetGroup

  SSIALBListenerRule:
    Type: 'AWS::ElasticLoadBalancingV2::ListenerRule'
    Properties:
      Actions:
        - Type: forward
          TargetGroupArn: !Ref SSIAPITargetGroup
      Conditions:
        - Field: host-header
          Values:
            - !Ref ssiapiurl
      ListenerArn: !Ref HTTPSLoadBalancerListener
      Priority: !Ref ssipriority

  FeedsALBListenerRule:
    Type: 'AWS::ElasticLoadBalancingV2::ListenerRule'
