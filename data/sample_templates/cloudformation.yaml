  ContainerInstances:
    Type: AWS::EC2::LaunchTemplate
    Properties: 
      LaunchTemplateName: !Ref ec2launchtemp
      LaunchTemplateData: 
        BlockDeviceMappings: 
          - Ebs:
              VolumeSize: !Ref ec2volume
              VolumeType: gp2
              DeleteOnTermination: !Ref ebstermination
              Encrypted: true
            DeviceName: /dev/xvda
        CreditSpecification: 
          CpuCredits: Unlimited
        Monitoring: 
          Enabled: false
        IamInstanceProfile: 
          Name: !Ref EC2InstanceProfile
        ImageId: !FindInMap [ AWSRegionToAMI, !Ref 'AWS::Region', AMIID ]
        InstanceType: !FindInMap [ Environments, !Ref 'environmenttype', instancetype ]
        KeyName: !Ref KeyName
        SecurityGroupIds: 
          - !Ref EcsSecurityGroup
        UserData:
          Fn::Base64:
            !Sub |
               #!/bin/bash -xe
               sudo dnf update -y
               sudo dnf install ecs-init -y
               sudo echo ECS_CLUSTER=${ECSCluster} | sudo tee -a /etc/ecs/ecs.config
               sudo echo "ECS_IMAGE_CLEANUP_INTERVAL=30m" | sudo tee -a /etc/ecs/ecs.config
               sudo echo "ECS_IMAGE_MINIMUM_CLEANUP_AGE=30m" | sudo tee -a /etc/ecs/ecs.config
               sudo sed -i '/After=cloud-final.service/d' /usr/lib/systemd/system/ecs.service
               sudo systemctl daemon-reload
               sudo systemctl enable ecs && sudo systemctl start ecs 
               sudo systemctl enable docker && systemctl restart sshd

  ECSAutoScalingGroup:
    Type: 'AWS::AutoScaling::AutoScalingGroup'
    Properties:
      AvailabilityZones:
        - !Select [ 0, !GetAZs '' ]
        - !Select [ 1, !GetAZs '' ]
        - !Select [ 2, !GetAZs '' ]
      VPCZoneIdentifier: !Ref privatesubnetid
      LaunchTemplate: 
        LaunchTemplateId: !Ref ContainerInstances
        Version: !GetAtt ContainerInstances.LatestVersionNumber
      MinSize: '4'
      MaxSize: !Ref MaxSize
      DesiredCapacity: !Ref DesiredCapacityec2
      Tags:
        - Key: 'Name'
          Value: !Sub ${ECSCluster}-asg
        - Key: 'GuardDutyManaged'
          Value: 'true'
          PropagateAtLaunch: true
    CreationPolicy:
      ResourceSignal:
        Timeout: PT15M
    UpdatePolicy:
      AutoScalingReplacingUpdate:
        WillReplace: 'true'

  ECSCapacityProvider:
    Type: AWS::ECS::CapacityProvider
    Properties:
      Name: !Sub ${ECSCluster}-cp
      AutoScalingGroupProvider:
        AutoScalingGroupArn: !Ref ECSAutoScalingGroup
        ManagedScaling:
          InstanceWarmupPeriod: 200
          MaximumScalingStepSize: !Ref MaxSize
          MinimumScalingStepSize: 1
          Status: ENABLED
          TargetCapacity: 75

  ClusterCPAssociation:
    Type: "AWS::ECS::ClusterCapacityProviderAssociations"
    Properties:
      Cluster: !Ref ECSCluster
      CapacityProviders:
        - !Ref ECSCapacityProvider
      DefaultCapacityProviderStrategy:
        - CapacityProvider: !Ref ECSCapacityProvider
          Base: 0
          Weight: 1

  ssiservice:
    Type: 'AWS::ECS::Service'
    DependsOn: ['SSIALBListenerRule','ClusterCPAssociation']
    Properties:
      ServiceName: !Ref ssisercon
      Cluster: !Ref ECSCluster
      DesiredCount: !Ref DesiredCapacity
      DeploymentConfiguration:
         MaximumPercent: 200
         MinimumHealthyPercent: 100
         DeploymentCircuitBreaker:
           Enable: true
           Rollback: true
      DeploymentController:
         Type: "ECS"
      LoadBalancers:
        - ContainerName: !Ref ssisercon
          ContainerPort: !Ref ssiport
          TargetGroupArn: !Ref SSIAPITargetGroup
      Role: !Ref ECSServiceRole
      TaskDefinition: !Ref ssitaskdefinition

  ssiservicescalingpolicy:
    Type: 'AWS::ApplicationAutoScaling::ScalingPolicy'
    Properties:
      PolicyName: !Sub ${ECSCluster}-${ssisercon}-cpu75
      PolicyType: TargetTrackingScaling
      ScalingTargetId: !Ref ssiservicescalingtarget
      TargetTrackingScalingPolicyConfiguration:
        DisableScaleIn: false
        PredefinedMetricSpecification:
          PredefinedMetricType: "ECSServiceAverageCPUUtilization"
        ScaleInCooldown: 60
        ScaleOutCooldown: 20
        TargetValue: 75

  ssiservicescalingtarget:
    Type: 'AWS::ApplicationAutoScaling::ScalableTarget'
    DependsOn: ssiservice
    Properties:
      MaxCapacity: !Ref ContainerMaxCapacity
      MinCapacity: 1
      ResourceId: !Sub "service/${ECSCluster}/${ssiservice.Name}"
      RoleARN: !GetAtt AutoscalingRole.Arn
      ScalableDimension: 'ecs:service:DesiredCount'
      ServiceNamespace: ecs

